name: vecto
description: "Bug WhatsApp Crasher"
publish_to: 'none'
version: 1.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  file_picker: ^8.0.0+1
  archive: ^3.4.0
  process_run: ^1.1.0
  animations: ^2.0.11
  ssh2: ^2.1.0
  url_launcher: ^6.2.6
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  device_info_plus: ^12.3.0
  carousel_slider: ^5.1.1
  web_socket_channel: ^3.0.3
  network_info_plus: ^7.0.0
  permission_handler: ^12.0.1
  video_player: ^2.9.2
  font_awesome_flutter: ^10.7.0
  path_provider: ^2.1.2
  share_plus: ^12.0.1
  chewie: ^1.5.2
  audioplayers: ^6.5.1
  latlong2: ^0.9.1
  audio_service: ^0.18.18
  pdf: ^3.10.7
  printing: ^5.12.0
  just_audio: ^0.9.36
  audio_session: ^0.1.7
  qr_flutter: ^4.1.0
  image_picker: ^1.0.4
  cached_network_image: ^3.4.1
  webview_flutter: ^4.13.1
  google_fonts: ^7.0.1
  intl: ^0.19.0
  geolocator: ^13.0.1
  geocoding: ^2.1.0
  dropdown_search: ^5.0.6
  open_filex: ^4.4.0
  dio: ^5.4.0
  flutter_map: ^8.2.2
  flutter_local_notifications: ^17.2.1
  record: ^6.2.0
  mime: ^1.0.4
  
dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  uuid: ^3.0.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path_android: assets/icon/icon.jpg
  image_path_ios: assets/icon/icon/icon.jpg
  image_path: assets/icon/icon.jpg
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.jpg
    - assets/images/banner.jpg
    - assets/images/vecto.jpg
    - assets/images/banner.mp4
    - assets/videos/banner.mp4
    - assets/videos/splash.mp4
    - assets/videos/landing.mp4

  fonts:
    - family: Orbitron
      fonts:
        - asset: fonts/Orbitron-Medium.ttf
    - family: ShareTechMono
      fonts:
        - asset: fonts/SpaceMono-Regular.ttf
