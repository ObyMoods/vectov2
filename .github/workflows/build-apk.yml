name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      
      - name: Patch ssh2 package
        run: |
          # Install dependencies terlebih dahulu
          flutter pub get || true
          
          # Patch semua file ssh2 yang ditemukan
          find ~/.pub-cache/hosted/pub.dev -type d -name "ssh2-*" 2>/dev/null | while read dir; do
            if [ -f "$dir/android/build.gradle" ]; then
              echo "Patching: $dir/android/build.gradle"
              sed -i 's/android {/android {\n    namespace "com.github.ssh2"/' "$dir/android/build.gradle"
            fi
          done
      
      - name: Build APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
